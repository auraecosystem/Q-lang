[package]
name = "q-lang"
version = "0.1.0"
edition = "2024"
authors = ["Seriki Yakub"]
license = "Apache-2.0"
description = "Q Programming Language"
repository = "https://github.com/auraecosystem/Q-lang"
homepage = "https://github.com/auraecosystem/Q-lang"
readme = "README.md"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
logos = "0.15"
thiserror = "2.0"
anyhow = "1.0"
colored = "3.0"
miette = { version = "7", features = ["fancy"] }
ariadne = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.9"
walkdir = "2.5"
indexmap = "2.8"
parking_lot = "0.12"
rayon = "1.10"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
criterion = "0.6"

[[bin]]
name = "q"
path = "src/main.rs"
